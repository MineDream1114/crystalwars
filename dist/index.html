<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Crystal Wars - A first-person 3D island action game" />
  <title>Crystal Wars</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <script type="module" crossorigin src="./assets/index-CmKH9eLp.js"></script>
  <link rel="stylesheet" crossorigin href="./assets/index-CqsSjBvk.css">
</head>
<body>
  <div id="game-container">
    <canvas id="game-canvas"></canvas>
  </div>

  <!-- Title Screen -->
  <div id="title-screen" class="screen active">
    <div class="title-content">
      <h1 class="game-title">CRYSTAL WARS</h1>
      <p class="game-subtitle" data-i18n="titleSubtitle">Destroy the crystals. Conquer the islands.</p>
      
      <div class="stage-select-container" style="margin-bottom: 24px; text-align: center;">
        <label for="stage-select" style="font-family: var(--font-display); color: var(--color-primary-glow); display: block; margin-bottom: 8px;" data-i18n="stage">Stage / Map</label>
        <select id="stage-select" class="btn-secondary" style="padding: 10px 16px; font-size: 1rem; border-radius: 8px; outline: none; appearance: auto; color: var(--color-text);">
          <option value="mainland" data-i18n="mainlandMode">🗺️ Infinite Mainland</option>
          <option value="islands" data-i18n="islandsMode">🏝️ Floating Islands</option>
        </select>
      </div>

      <div class="title-buttons">
        <button id="btn-start" class="btn btn-primary" data-i18n="startGame">Start Game</button>
        <button id="btn-settings" class="btn btn-secondary" data-i18n="settings">Settings</button>
      </div>
    </div>
  </div>

  <!-- Settings Screen -->
  <div id="settings-screen" class="screen">
    <div class="settings-panel">
      <h2 data-i18n="settings">Settings</h2>
      <div class="setting-row">
        <label data-i18n="language">Language</label>
        <select id="language-select">
          <option value="en">English</option>
          <option value="ja">日本語</option>
        </select>
      </div>
      <div class="setting-row">
        <label data-i18n="mouseSensitivity">Mouse Sensitivity</label>
        <input type="range" id="sensitivity-slider" min="1" max="10" value="5" />
      </div>
      <button id="btn-settings-back" class="btn btn-secondary" data-i18n="back">Back</button>
    </div>
  </div>

  <!-- Tutorial Overlay -->
  <div id="tutorial-overlay" class="screen">
    <div class="tutorial-panel">
      <h2 data-i18n="tutorialTitle">How to Play</h2>
      <div class="tutorial-content" id="tutorial-content"></div>
      <button id="btn-tutorial-close" class="btn btn-primary" data-i18n="letsGo">Let's Go!</button>
    </div>
  </div>

  <!-- HUD -->
  <div id="hud" class="hud hidden">
    <div id="crosshair">+</div>
    <div id="health-bar">
      <div id="health-fill"></div>
      <span id="health-text">100</span>
    </div>
    <div id="currency-display">
      <span id="copper-count" class="currency"><span class="currency-icon copper-icon">●</span> <span class="currency-val">0</span></span>
      <span id="gold-count" class="currency"><span class="currency-icon gold-icon">●</span> <span class="currency-val">0</span></span>
      <span id="emerald-count" class="currency"><span class="currency-icon emerald-icon">●</span> <span class="currency-val">0</span></span>
      <span id="diamond-count" class="currency"><span class="currency-icon diamond-icon">●</span> <span class="currency-val">0</span></span>
    </div>
    <div id="objective-display">
      <span id="objective-text" data-i18n="objectiveDestroy">Destroy all 8 crystals!</span>
      <span id="crystal-count">0 / 8</span>
    </div>
    <div id="hotbar"></div>
    <div id="interact-prompt" class="hidden">
      <span data-i18n="pressE">Press [E] to interact</span>
    </div>
    <div id="notification" class="hidden"></div>
    
    <!-- Mobile Controls Layer -->
    <div id="mobile-controls" class="hidden">
      <!-- Left side: Joystick -->
      <div id="joystick-zone">
        <div id="joystick-base">
          <div id="joystick-stick"></div>
        </div>
      </div>
      <!-- Touch look zone (right half of screen implicitly handles touchmove in mobileControls.ts) -->
      
      <!-- Right side buttons -->
      <button id="btn-mobile-jump" class="mobile-btn">▲</button>
      <button id="btn-mobile-action" class="mobile-btn">⚒️</button>
      <button id="btn-mobile-interact" class="mobile-btn hidden">🖐️</button>
      
      <!-- Top right pause -->
      <button id="btn-mobile-pause" class="mobile-btn">⏸️</button>
    </div>
  </div>

  <!-- Shop UI -->
  <div id="shop-screen" class="screen">
    <div class="shop-panel">
      <h2 data-i18n="merchantShop">Merchant Shop</h2>
      <div id="shop-items" class="shop-grid"></div>
      <button id="btn-shop-close" class="btn btn-secondary" data-i18n="close">Close</button>
    </div>
  </div>

  <!-- Pause Menu -->
  <div id="pause-screen" class="screen">
    <div class="pause-panel">
      <h2 data-i18n="paused">Paused</h2>
      <button id="btn-resume" class="btn btn-primary" data-i18n="resume">Resume</button>
      <button id="btn-pause-settings" class="btn btn-secondary" data-i18n="settings">Settings</button>
    </div>
  </div>

  <!-- Win Screen -->
  <div id="win-screen" class="screen">
    <div class="win-content">
      <h1 class="win-title" data-i18n="victory">VICTORY!</h1>
      <p class="win-subtitle" data-i18n="victoryMessage">You destroyed all the crystals!</p>
      <button id="btn-restart" class="btn btn-primary" data-i18n="playAgain">Play Again</button>
    </div>
  </div>

</body>
</html>
